<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapZilla Kit Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: #e2ddd7;
  --border2: #c9c3bb;
  --text: #1a1916;
  --text2: #6b6760;
  --text3: #9b978f;
  --green-bg: #edf7ed;
  --green-border: #a5d6a7;
  --green-text: #2e7d32;
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* TOP BAR */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-logo {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.topbar-logo .sep { color: var(--border2); font-weight: 300; margin: 0 2px; }
.topbar-logo .sub { color: var(--text2); font-weight: 400; }
.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.topbar-date {
  font-size: 12px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
}
.refresh-btn {
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  color: var(--text2);
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 11px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.refresh-btn:hover { color: var(--text); border-color: var(--border2); }
.refresh-btn svg { width: 12px; height: 12px; }

/* MAIN */
.main { max-width: 680px; margin: 0 auto; padding: 28px 20px 80px; }

/* LOADING / ERROR STATES */
.state-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.state-msg .icon { font-size: 32px; margin-bottom: 12px; }
.state-msg h3 { font-size: 15px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
.state-msg p { font-size: 13px; line-height: 1.6; }
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--text2);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* KIT GRID */
.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 12px;
}
.kit-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 28px;
}
@media (max-width: 400px) {
  .kit-grid { grid-template-columns: repeat(2, 1fr); }
}
.kit-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 12px 14px;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.15s, transform 0.1s, background 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.kit-card:hover { border-color: var(--border2); }
.kit-card:active { transform: scale(0.97); }
.kit-card.active {
  border: 2px solid var(--text);
  background: var(--text);
  color: #fff;
}
.kit-card.active .kit-count { color: rgba(255,255,255,0.5); }
.kit-emoji { font-size: 22px; margin-bottom: 7px; line-height: 1; }
.kit-name { font-size: 12px; font-weight: 600; letter-spacing: -0.1px; line-height: 1.3; }
.kit-count { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* CHECKLIST PANEL */
.checklist-panel { display: none; }
.checklist-panel.visible { display: block; }

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  gap: 12px;
}
.panel-title {
  font-size: 19px;
  font-weight: 600;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}
.panel-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.progress-badge {
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
  transition: all 0.25s;
  white-space: nowrap;
}
.progress-badge.complete {
  background: var(--green-bg);
  border-color: var(--green-border);
  color: var(--green-text);
}
.reset-btn {
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  color: var(--text3);
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.reset-btn:hover { color: var(--text); border-color: var(--border2); }

/* PROGRESS BAR */
.progress-bar-wrap {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 18px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--text);
  border-radius: 2px;
  transition: width 0.3s ease, background 0.3s;
  width: 0%;
}
.progress-bar-fill.complete { background: var(--green-text); }

/* NOTES */
.kit-notes {
  font-size: 13px;
  color: var(--text2);
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 16px;
  line-height: 1.5;
}

/* CATEGORY LABEL */
.cat-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 12px 0 6px;
}
.cat-label:first-child { padding-top: 0; }

/* ITEM ROWS */
.items-list { display: flex; flex-direction: column; }

.item-row {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.item-row:hover { border-color: var(--border2); }
.item-row:active { transform: scale(0.99); }
.item-row.checked {
  background: var(--green-bg);
  border-color: var(--green-border);
}

.check-circle {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.item-row.checked .check-circle {
  background: var(--green-text);
  border-color: var(--green-text);
}
.check-svg { opacity: 0; transition: opacity 0.15s; }
.item-row.checked .check-svg { opacity: 1; }

.item-body { flex: 1; min-width: 0; }
.item-name {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.2px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-row.checked .item-name { color: var(--green-text); }

.item-meta {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-row.checked .item-meta { color: #81c784; }

.item-code {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 3px 8px;
  border-radius: 5px;
  flex-shrink: 0;
  white-space: nowrap;
}
.item-row.checked .item-code {
  background: transparent;
  border-color: var(--green-border);
  color: #81c784;
}

/* ALL DONE */
.all-done {
  display: none;
  margin-top: 12px;
  padding: 22px 20px;
  background: var(--green-bg);
  border: 1px solid var(--green-border);
  border-radius: var(--radius);
  text-align: center;
}
.all-done.visible { display: block; }
.all-done-icon { font-size: 30px; margin-bottom: 8px; }
.all-done h3 { font-size: 15px; font-weight: 600; color: var(--green-text); margin-bottom: 3px; }
.all-done p { font-size: 13px; color: #4caf50; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    📦 SnapZilla <span class="sep">/</span> <span class="sub">Kit Checker</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-date" id="today-date"></span>
    <button class="refresh-btn" onclick="loadKits()" title="Refresh from Notion">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.5 2A5 5 0 1 0 11 6"/>
        <polyline points="8,0 10.5,2 8,4.5"/>
      </svg>
      Refresh
    </button>
  </div>
</div>

<div class="main">
  <div id="app-content">
    <div class="state-msg" id="loading-state">
      <div class="spinner"></div>
      <h3>Loading kits…</h3>
      <p>Fetching live data from Notion</p>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────
let kitsData = [];
let currentKitIdx = null;
let checked = {};

// ── Date ─────────────────────────────────────────────────────
document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-GB', {
  weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'
});

// ── Category sort order ───────────────────────────────────────
const CAT_ORDER = ['Camera Body', 'Lens', 'Lighting', 'Battery', 'Charger', 'POS', 'Other'];

// ── Fetch kits from our proxy ─────────────────────────────────
async function loadKits() {
  setContent(`
    <div class="state-msg" id="loading-state">
      <div class="spinner"></div>
      <h3>Loading kits…</h3>
      <p>Fetching live data from Notion</p>
    </div>
  `);

  try {
    const res = await fetch('/api/kits');
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    kitsData = data.kits;
    currentKitIdx = null;
    checked = {};
    renderApp();
  } catch (err) {
    setContent(`
      <div class="state-msg">
        <div class="icon">⚠️</div>
        <h3>Could not load kits</h3>
        <p>${err.message}<br><br>
        <button class="refresh-btn" onclick="loadKits()" style="margin:0 auto;display:inline-flex;">
          Try again
        </button></p>
      </div>
    `);
  }
}

// ── Render full app ───────────────────────────────────────────
function renderApp() {
  const gridItems = kitsData.map((kit, i) => `
    <button class="kit-card${currentKitIdx === i ? ' active' : ''}" id="kit-btn-${i}" onclick="selectKit(${i})">
      <div class="kit-emoji">${kit.icon || '🎒'}</div>
      <div class="kit-name">${escHtml(kit.name)}</div>
      <div class="kit-count">${kit.items.length} item${kit.items.length !== 1 ? 's' : ''}</div>
    </button>
  `).join('');

  const checklist = currentKitIdx !== null ? renderChecklist(kitsData[currentKitIdx]) : '';

  setContent(`
    <div class="section-label">Select a kit</div>
    <div class="kit-grid">${gridItems}</div>
    <div class="checklist-panel${currentKitIdx !== null ? ' visible' : ''}" id="checklist-panel">
      ${checklist}
    </div>
  `);
}

// ── Select a kit ──────────────────────────────────────────────
function selectKit(idx) {
  if (currentKitIdx !== idx) {
    currentKitIdx = idx;
    checked = {};
  }
  renderApp();
  setTimeout(() => {
    document.getElementById('checklist-panel')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

// ── Render checklist for a kit ────────────────────────────────
function renderChecklist(kit) {
  const total = kit.items.length;
  const done = Object.values(checked).filter(Boolean).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  const complete = done === total && total > 0;

  // Group by category
  const cats = {};
  kit.items.forEach((item, i) => {
    const cat = item.category || 'Other';
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push({ ...item, idx: i });
  });
  const sortedCats = [
    ...CAT_ORDER.filter(c => cats[c]),
    ...Object.keys(cats).filter(c => !CAT_ORDER.includes(c))
  ];

  let itemsHtml = '';
  sortedCats.forEach(cat => {
    itemsHtml += `<div class="cat-label">${escHtml(cat)}</div>`;
    cats[cat].forEach(item => {
      const parts = [
        item.brand && item.brand !== 'N/A' && item.brand !== item.name ? item.brand : null,
        item.model && item.model !== item.brand ? item.model : null,
        item.serial && item.serial !== 'N/A' ? '#' + item.serial : null,
      ].filter(Boolean);
      const meta = parts.join(' · ');
      const isChecked = !!checked[item.idx];

      itemsHtml += `
        <div class="item-row${isChecked ? ' checked' : ''}" onclick="toggleItem(${item.idx})">
          <div class="check-circle">
            <svg class="check-svg" width="11" height="11" viewBox="0 0 11 11" fill="none">
              <path d="M1.5 5.5L4.5 8.5L9.5 2.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="item-body">
            <div class="item-name">${escHtml(item.name)}</div>
            ${meta ? `<div class="item-meta">${escHtml(meta)}</div>` : ''}
          </div>
          ${item.labelCode ? `<div class="item-code">${escHtml(item.labelCode)}</div>` : ''}
        </div>`;
    });
  });

  const notesHtml = kit.notes
    ? `<div class="kit-notes">📝 ${escHtml(kit.notes)}</div>`
    : '';

  const allDoneHtml = `
    <div class="all-done${complete ? ' visible' : ''}" id="all-done">
      <div class="all-done-icon">✅</div>
      <h3>Kit ready to go!</h3>
      <p>All ${total} items checked and accounted for.</p>
    </div>`;

  return `
    <div class="panel-header">
      <div class="panel-title">${kit.icon || '🎒'} ${escHtml(kit.name)}</div>
      <div class="panel-actions">
        <span class="progress-badge${complete ? ' complete' : ''}" id="progress-badge">${done} / ${total}</span>
        <button class="reset-btn" onclick="resetKit()">Reset</button>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill${complete ? ' complete' : ''}" style="width:${pct}%"></div>
    </div>
    ${notesHtml}
    <div class="items-list">${itemsHtml}</div>
    ${allDoneHtml}
  `;
}

// ── Toggle item ───────────────────────────────────────────────
function toggleItem(idx) {
  checked[idx] = !checked[idx];
  // Re-render just the checklist panel content without a full reload
  const panel = document.getElementById('checklist-panel');
  if (panel && currentKitIdx !== null) {
    panel.innerHTML = renderChecklist(kitsData[currentKitIdx]);
  }
}

// ── Reset ─────────────────────────────────────────────────────
function resetKit() {
  checked = {};
  const panel = document.getElementById('checklist-panel');
  if (panel && currentKitIdx !== null) {
    panel.innerHTML = renderChecklist(kitsData[currentKitIdx]);
  }
}

// ── Helpers ───────────────────────────────────────────────────
function setContent(html) {
  document.getElementById('app-content').innerHTML = html;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Init ──────────────────────────────────────────────────────
loadKits();
</script>
</body>
</html>
